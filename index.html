<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Boboty</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #111827;
}

.app {
  max-width: 1100px;
  margin: auto;
  padding: 25px;
}

.hero {
  background: linear-gradient(135deg, #0f766e, #1d4ed8);
  color: white;
  padding: 30px;
  border-radius: 20px;
  margin-bottom: 20px;
}

.hero h1 {
  margin: 0;
  font-size: 40px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 18px;
  margin-bottom: 20px;
}

.nav {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.nav button {
  flex: 1;
  background: #1e3a8a;
}

input, button {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #cbd5e1;
  font-size: 15px;
}

button {
  background: #1d4ed8;
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #1e40af;
}

.green {
  background: #0f766e;
}

.red {
  background: #991b1b;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 10px;
}

.match {
  background: #f8fafc;
  padding: 18px;
  border-radius: 14px;
  border: 1px solid #e5e7eb;
  margin-bottom: 15px;
}

.match-title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 10px;
}

.score {
  display: grid;
  grid-template-columns: 1fr 90px 90px auto;
  gap: 10px;
  align-items: center;
}

.notice {
  background: #eff6ff;
  border-left: 5px solid #2563eb;
  padding: 10px;
  border-radius: 8px;
  margin: 10px 0;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #1e3a8a;
  color: white;
}

td, th {
  padding: 12px;
  border-bottom: 1px solid #e5e7eb;
  text-align: left;
}

.vista {
  display: none;
}

.vista.activa {
  display: block;
}

@media(max-width: 750px) {
  .grid, .score, .nav {
    grid-template-columns: 1fr;
    display: grid;
  }

  .hero h1 {
    font-size: 30px;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="hero">
    <h1>Quiniela Boboty</h1>
    <p>Pronósticos diarios, resultados y ranking automático</p>
  </div>

  <div class="card" id="loginCard">
    <h2>Ingreso de usuario</h2>
    <div class="grid">
      <input id="nombreUsuario" placeholder="Nombre">
      <input id="pinUsuario" type="password" placeholder="PIN">
      <button onclick="entrar()">Entrar / Registrarse</button>
    </div>
    <div id="usuarioActivo" class="notice">Ingrese su nombre y PIN. Si es nuevo, se creará automáticamente.</div>
  </div>

  <div class="nav">
    <button onclick="mostrarVista('pronosticos')">Pronósticos</button>
    <button onclick="mostrarVista('ranking')">Ranking</button>
    <button id="btnAdmin" onclick="mostrarVista('admin')" style="display:none;">Administración</button>
  </div>

  <section id="vista-pronosticos" class="vista activa">
    <div class="card">
      <h2>Fecha de la jornada</h2>
      <div class="grid">
        <input type="date" id="fecha" onchange="cargarTodo()">
        <button class="green" onclick="cargarTodo()">Cargar jornada</button>
      </div>
    </div>

    <div class="card">
      <h2>Partidos del día</h2>
      <div id="partidos"></div>
    </div>
  </section>

  <section id="vista-ranking" class="vista">
    <div class="card">
      <h2>Ranking diario</h2>
      <table>
        <thead>
          <tr>
            <th>Posición</th>
            <th>Usuario</th>
            <th>Puntos</th>
          </tr>
        </thead>
        <tbody id="ranking"></tbody>
      </table>
    </div>
  </section>

  <section id="vista-admin" class="vista">
    <div class="card">
      <h2>Crear partido</h2>
      <div class="grid">
        <input id="adminLocal" placeholder="Equipo local">
        <input id="adminVisitante" placeholder="Equipo visitante">
        <input id="adminFecha" type="date">
        <button onclick="crearPartido()">Crear</button>
      </div>
    </div>

    <div class="card">
      <h2>Registrar resultado oficial</h2>
      <div id="adminResultados"></div>
    </div>
  </section>

</div>

<script>
const SUPABASE_URL = "https://djrntoiunpgcurwvyazk.supabase.co";
const SUPABASE_KEY = "sb_publishable_J57IuliY3QIvfiS7mmBDjQ_A8SmNpYJ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let usuario = null;

document.getElementById("fecha").value = new Date().toISOString().split("T")[0];
document.getElementById("adminFecha").value = document.getElementById("fecha").value;

function mostrarVista(nombre) {
  document.querySelectorAll(".vista").forEach(v => v.classList.remove("activa"));
  document.getElementById("vista-" + nombre).classList.add("activa");
}

async function entrar() {
  const nombre = document.getElementById("nombreUsuario").value.trim();
  const pin = document.getElementById("pinUsuario").value.trim();

  if (!nombre || !pin) {
    alert("Ingrese nombre y PIN.");
    return;
  }

  let { data, error } = await supabase
    .from("usuarios")
    .select("*")
    .eq("nombre", nombre)
    .maybeSingle();

  if (!data) {
    const nuevo = await supabase
      .from("usuarios")
      .insert({ nombre, pin, rol: "usuario" })
      .select()
      .single();

    data = nuevo.data;
    error = nuevo.error;
  } else {
    if (data.pin !== pin) {
      alert("PIN incorrecto.");
      return;
    }
  }

  if (error) {
    alert("Error: " + error.message);
    return;
  }

  usuario = data;

  localStorage.setItem("nombreUsuario", nombre);
  localStorage.setItem("pinUsuario", pin);

  document.getElementById("usuarioActivo").innerText =
    "Usuario activo: " + usuario.nombre;

  if (usuario.rol === "admin") {
    document.getElementById("btnAdmin").style.display = "block";
  } else {
    document.getElementById("btnAdmin").style.display = "none";
  }

  cargarTodo();
}

async function cargarTodo() {
  await cargarPartidos();
  await cargarRanking();
}

async function cargarPartidos() {
  const fecha = document.getElementById("fecha").value;

  const { data: partidos, error } = await supabase
    .from("partidos")
    .select("*")
    .eq("fecha", fecha)
    .order("id", { ascending: true });

  const contenedor = document.getElementById("partidos");
  const admin = document.getElementById("adminResultados");

  contenedor.innerHTML = "";
  admin.innerHTML = "";

  if (error) {
    contenedor.innerHTML = "Error al cargar partidos.";
    return;
  }

  if (!partidos || partidos.length === 0) {
    contenedor.innerHTML = "No hay partidos creados para esta fecha.";
    return;
  }

  for (const p of partidos) {
    let pronostico = null;

    if (usuario) {
      const res = await supabase
        .from("pronosticos")
        .select("*")
        .eq("usuario_id", usuario.id)
        .eq("partido_id", p.id)
        .maybeSingle();

      pronostico = res.data;
    }

    contenedor.innerHTML += `
      <div class="match">
        <div class="match-title">${p.equipo_local} vs ${p.equipo_visitante}</div>

        <div class="notice">
          Resultado oficial:
          ${p.goles_local === null ? "Pendiente" : p.goles_local + " - " + p.goles_visitante}
        </div>

        <div class="score">
          <div>Su pronóstico</div>
          <input id="pl_${p.id}" type="number" min="0" value="${pronostico ? pronostico.goles_local : ""}">
          <input id="pv_${p.id}" type="number" min="0" value="${pronostico ? pronostico.goles_visitante : ""}">
          <button onclick="guardarPronostico(${p.id}, ${p.cerrado})">
            Guardar / Actualizar
          </button>
        </div>
      </div>
    `;

    admin.innerHTML += `
      <div class="match">
        <div class="match-title">${p.equipo_local} vs ${p.equipo_visitante}</div>

        <div class="score">
          <div>Resultado oficial</div>
          <input id="rl_${p.id}" type="number" min="0" value="${p.goles_local ?? ""}">
          <input id="rv_${p.id}" type="number" min="0" value="${p.goles_visitante ?? ""}">
          <button class="green" onclick="guardarResultado(${p.id})">Guardar resultado</button>
        </div>
      </div>
    `;
  }
}

async function guardarPronostico(partidoId, cerrado) {
  if (!usuario) {
    alert("Primero debe ingresar su usuario.");
    return;
  }

  if (cerrado) {
    alert("Este partido ya está cerrado. No se puede modificar el pronóstico.");
    return;
  }

  const golesLocal = document.getElementById("pl_" + partidoId).value;
  const golesVisitante = document.getElementById("pv_" + partidoId).value;

  if (golesLocal === "" || golesVisitante === "") {
    alert("Ingrese ambos marcadores.");
    return;
  }

  const { error } = await supabase
    .from("pronosticos")
    .upsert({
      usuario_id: usuario.id,
      partido_id: partidoId,
      goles_local: Number(golesLocal),
      goles_visitante: Number(golesVisitante),
      actualizado_en: new Date().toISOString()
    }, {
      onConflict: "usuario_id,partido_id"
    });

  if (error) {
    alert("Error: " + error.message);
    return;
  }

  alert("Pronóstico guardado.");
  cargarTodo();
}

async function crearPartido() {
  if (!usuario || usuario.rol !== "admin") {
    alert("Solo el administrador puede crear partidos.");
    return;
  }

  const equipo_local = document.getElementById("adminLocal").value.trim();
  const equipo_visitante = document.getElementById("adminVisitante").value.trim();
  const fecha = document.getElementById("adminFecha").value;

  if (!equipo_local || !equipo_visitante || !fecha) {
    alert("Complete todos los datos del partido.");
    return;
  }

  const { error } = await supabase
    .from("partidos")
    .insert({ equipo_local, equipo_visitante, fecha });

  if (error) {
    alert("Error: " + error.message);
    return;
  }

  document.getElementById("adminLocal").value = "";
  document.getElementById("adminVisitante").value = "";

  alert("Partido creado.");
  cargarTodo();
}

async function guardarResultado(partidoId) {
  if (!usuario || usuario.rol !== "admin") {
    alert("Solo el administrador puede registrar resultados.");
    return;
  }

  const golesLocal = document.getElementById("rl_" + partidoId).value;
  const golesVisitante = document.getElementById("rv_" + partidoId).value;

  if (golesLocal === "" || golesVisitante === "") {
    alert("Ingrese ambos resultados.");
    return;
  }

  const { error } = await supabase
    .from("partidos")
    .update({
      goles_local: Number(golesLocal),
      goles_visitante: Number(golesVisitante),
      cerrado: true
    })
    .eq("id", partidoId);

  if (error) {
    alert("Error: " + error.message);
    return;
  }

  await calcularPuntos(partidoId);
  alert("Resultado guardado y puntos calculados.");
  cargarTodo();
}

async function calcularPuntos(partidoId) {
  const { data: partido } = await supabase
    .from("partidos")
    .select("*")
    .eq("id", partidoId)
    .single();

  const { data: pronosticos } = await supabase
    .from("pronosticos")
    .select("*")
    .eq("partido_id", partidoId);

  for (const pr of pronosticos) {
    let puntos = 0;

    const exacto =
      pr.goles_local === partido.goles_local &&
      pr.goles_visitante === partido.goles_visitante;

    const resultadoPronostico =
      pr.goles_local > pr.goles_visitante ? "L" :
      pr.goles_local < pr.goles_visitante ? "V" : "E";

    const resultadoReal =
      partido.goles_local > partido.goles_visitante ? "L" :
      partido.goles_local < partido.goles_visitante ? "V" : "E";

    if (exacto) puntos = 3;
    else if (resultadoPronostico === resultadoReal) puntos = 1;

    await supabase
      .from("pronosticos")
      .update({ puntos })
      .eq("id", pr.id);
  }
}

async function cargarRanking() {
  const fecha = document.getElementById("fecha").value;

  const { data } = await supabase
    .from("pronosticos")
    .select(`
      puntos,
      usuarios(nombre),
      partidos(fecha)
    `)
    .eq("partidos.fecha", fecha);

  const acumulado = {};

  if (data) {
    data.forEach(item => {
      if (!item.usuarios || !item.partidos) return;

      const nombre = item.usuarios.nombre;
      acumulado[nombre] = (acumulado[nombre] || 0) + item.puntos;
    });
  }

  const ranking = Object.entries(acumulado)
    .sort((a, b) => b[1] - a[1]);

  const tbody = document.getElementById("ranking");
  tbody.innerHTML = "";

  if (ranking.length === 0) {
    tbody.innerHTML = "<tr><td colspan='3'>No hay puntos registrados todavía.</td></tr>";
    return;
  }

  ranking.forEach((r, index) => {
    tbody.innerHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${r[0]}</td>
        <td>${r[1]}</td>
      </tr>
    `;
  });
}

const nombreGuardado = localStorage.getItem("nombreUsuario");
const pinGuardado = localStorage.getItem("pinUsuario");

if (nombreGuardado && pinGuardado) {
  document.getElementById("nombreUsuario").value = nombreGuardado;
  document.getElementById("pinUsuario").value = pinGuardado;
}

cargarTodo();
</script>

</body>
</html>
