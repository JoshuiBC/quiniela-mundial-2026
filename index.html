<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quiniela Boboty</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#0d6efd;
    margin-bottom:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr auto;
    gap:10px;
}

input{
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:8px;
    padding:12px 20px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#0d6efd;
    color:white;
}

th,td{
    padding:12px;
    border:1px solid #ddd;
    text-align:left;
}

@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }
}
</style>

</head>
<body>

<div class="container">

<div class="card">

<h1>⚽ Quiniela Boboty ⚽</h1>

<div class="form-grid">

<input id="participante" placeholder="Nombre">

<input id="partido" placeholder="Ej: Costa Rica vs España">

<input id="marcador" placeholder="Ej: 2-1">

<button onclick="guardar()">Guardar</button>

</div>

<h2>Pronósticos registrados</h2>

<table>
<thead>
<tr>
<th>Participante</th>
<th>Partido</th>
<th>Marcador</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

</div>

<script>

const SUPABASE_URL =
"https://djrntoiunpgcurwvyazk.supabase.co";

const SUPABASE_KEY =
"sb_publishable_J57IuliY3QIvfiS7mmBDjQ_A8SmNpYJ";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function guardar(){

const participante =
document.getElementById("participante").value;

const partido =
document.getElementById("partido").value;

const marcador =
document.getElementById("marcador").value;

if(!participante || !partido || !marcador){
alert("Complete todos los campos");
return;
}

const {error} =
await supabase
.from("pronosticos")
.insert([
{
participante,
partido,
marcador
}
]);

if(error){
alert(error.message);
return;
}

document.getElementById("participante").value="";
document.getElementById("partido").value="";
document.getElementById("marcador").value="";

cargar();
}

async function cargar(){

const {data,error} =
await supabase
.from("pronosticos")
.select("*")
.order("id",{ascending:false});

if(error) return;

const tabla =
document.getElementById("tabla");

tabla.innerHTML="";

data.forEach(item=>{

tabla.innerHTML += `
<tr>
<td>${item.participante}</td>
<td>${item.partido}</td>
<td>${item.marcador}</td>
</tr>
`;

});

}

cargar();

</script>

</body>
</html>
